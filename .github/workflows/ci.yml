# CI Pipeline - manti_finance_dev
# Stack: React 18 + TypeScript + Vite + Vitest + Firebase
# Usa npm ci (deterministico) + cache npm nativa per build veloci e sicuri

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # -----------------------------------------------
  # JOB 1: Type check + Lint
  # -----------------------------------------------
  lint:
    name: TypeScript & ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

  # -----------------------------------------------
  # JOB 2: Unit Tests
  # -----------------------------------------------
  test:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Run tests with Emulator
        run: npx firebase emulators:exec "npm run test"

  # -----------------------------------------------
  # JOB 3: Build check
  # -----------------------------------------------
  build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high
