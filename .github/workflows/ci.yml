# CI Pipeline - manti_finance_dev
# Stack: React 18 + TypeScript + Vite + Vitest + Firebase
# Strategia: npm install con cache condizionale.
# Appena package-lock.json sarà nel repo, sostituire npm install con:
#   cache: 'npm' su setup-node + npm ci

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # -----------------------------------------------
  # JOB 1: Type check + Lint
  # -----------------------------------------------
  lint:
    name: TypeScript & ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      - name: TypeScript type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

  # -----------------------------------------------
  # JOB 2: Unit Tests
  # -----------------------------------------------
  test:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test

  # -----------------------------------------------
  # JOB 3: Build check
  # -----------------------------------------------
  build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
