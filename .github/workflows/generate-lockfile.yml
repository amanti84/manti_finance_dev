# Workflow una-tantum: genera package-lock.json e lo committa nel repo
# Eseguire manualmente da Actions > Generate package-lock.json > Run workflow
# Una volta committato il lock file, questo workflow può essere eliminato.

name: Generate package-lock.json

on:
  workflow_dispatch:

jobs:
  generate:
    name: Generate and commit package-lock.json
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate package-lock.json
        run: npm install

      - name: Commit package-lock.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git diff --cached --quiet || git commit -m "chore: add package-lock.json for deterministic installs"
          git push
