name: AI Triage — Routing automatico issue

on:
  issues:
    types: [opened, labeled]

jobs:
  triage:
    name: Gemini Triage — assegna agent corretto
    runs-on: ubuntu-latest
    if: |
      github.event.action == 'opened' ||
      github.event.label.name == 'triage-pending'
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Gemini Triage — analisi issue e routing
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Sei un triage agent per il repository manti_finance_dev.
            Leggi il titolo e il body dell'issue:

            TITOLO: ${{ github.event.issue.title }}
            BODY: ${{ github.event.issue.body }}

            Regola di routing:
            - Se l'issue richiede logica finanziaria complessa (calcoli fiscali,
              regole condizionali su TFR/Fon.Te/mutuo, simulazioni what-if,
              confidence scoring, decision engine): rispondi SOLO con claude-ready
            - Per tutto il resto (CRUD, UI, routing, deploy, document intake,
              servizi strutturati senza logica finanziaria): rispondi SOLO con jules-ready

            Rispondi con UNA SOLA PAROLA senza punteggiatura: jules-ready oppure claude-ready

      - name: Applica label routing
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `${{ steps.gemini.outputs.summary }}`;
            const label = output.trim().toLowerCase().replace(/[^a-z-]/g, '');
            if (!['jules-ready', 'claude-ready'].includes(label)) {
              console.log('Label non riconosciuto, uso jules-ready come fallback:', label);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: ['jules-ready']
              });
              return;
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [label]
            });
            console.log(`Label applicato: ${label} su issue #${context.payload.issue.number}`);
