# Deploy Firebase Cloud Functions — solo trigger manuale
# Per eseguire: GitHub Actions → "Deploy Firebase Functions" → Run workflow
# Per disabilitare: GitHub Actions → seleziona workflow → Disable workflow

name: Deploy Firebase Functions

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo del deploy'
        required: false
        default: 'Deploy manuale functions'

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        run: npm ci

      - name: Build Functions
        run: npm run build

      - name: Verify lib/index.js exists
        run: ls -la lib/index.js

      - name: Install firebase-tools
        working-directory: ${{ github.workspace }}
        run: npm install -g firebase-tools

      - name: Write service account key to file
        working-directory: ${{ github.workspace }}
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa_key.json

      - name: Deploy Functions
        working-directory: ${{ github.workspace }}
        run: firebase deploy --only functions --project mantifinance --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa_key.json
