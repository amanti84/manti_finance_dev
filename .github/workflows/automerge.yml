name: Auto-merge PR on CI green + automerge label

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  automerge:
    name: Auto-merge if CI green and label automerge
    runs-on: ubuntu-latest
    # Solo su PR verso main
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_run'

    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Auto-merge PR with label automerge
        uses: pascalgn/automerge-action@v0.16.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_LABELS: "automerge"
          MERGE_METHOD: "squash"
          MERGE_COMMIT_MESSAGE: "pull-request-title"
          MERGE_FORKS: "false"
          MERGE_RETRIES: "6"
          MERGE_RETRY_SLEEP: "10000"
          UPDATE_LABELS: ""
          UPDATE_METHOD: "rebase"
          MERGE_FILTER_AUTHOR: ""
          MERGE_REMOVE_LABELS: "automerge"
