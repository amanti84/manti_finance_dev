name: Assign Claude — logica finanziaria complessa

on:
  issues:
    types: [labeled]

jobs:
  assign-claude:
    name: Claude Code Action
    runs-on: ubuntu-latest
    if: github.event.label.name == 'claude-ready'
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Claude Code — logica finanziaria complessa
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-opus-4-5
          direct_prompt: |
            Sei il coding agent per logica finanziaria complessa su manti_finance_dev.

            Leggi prima di iniziare:
            - AGENTS.md (root) — regole operative complete
            - .github/copilot-instructions.md — stack e convenzioni
            - src/services/payroll.ts — riferimento canonico ApiResult<T>

            Issue assegnata: #${{ github.event.issue.number }}
            Titolo: ${{ github.event.issue.title }}

            Regole critiche per logica finanziaria:
            - Pattern ApiResult<T> obbligatorio su tutti i metodi di servizio
            - auditService.log() chiamato PRIMA di ogni write su Firestore
            - Arrotondamento: Math.round(val * 100) / 100 per valori monetari
            - TFR: calcolo annuale, non mensile
            - Fon.Te: tetto annuo deducibilità €5.164,57
            - In caso di dubbio su logica fiscale: lascia commento nella PR, NON bloccare

            Workflow:
            1. Verifica dipendenze (non iniziare se dipendenza open)
            2. Crea branch: feat/issue-${{ github.event.issue.number }}-titolo-breve
            3. Scrivi codice + test (min. 3 test)
            4. Esegui: gh pr create --base main --title "[#${{ github.event.issue.number }}] feat: <descrizione>" --body "closes #${{ github.event.issue.number }}" e aggiungi label automerge con: gh pr edit --add-label automerge
            5. Aggiungi label automerge SOLO se nessuna ambiguità finanziaria
